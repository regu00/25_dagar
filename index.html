<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="dagar.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <title>Calendar</title>
</head>
<body class="d-flex justify-content-center align-items-center">
<main>
  <div class="container p-5">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="p-4 bg-white rounded text-center">
          <form>

            <select id="calc-mode" class="form-select">
            <option value="days">Arbetsdagar till..</option>
            <option value="future">25 dagar från..</option>
            </select>

            <input type="date" id="date-input" class="date-input">

            <p class="roboto-regular">Resultat: <span id="days-function">XX</span></p>

          </form>
        </div>
      </div>
      <div class="col-md-6 border-start center">
        <div class="p-4 bg-white rounded text-center">
          <p class="mt-4 roboto-regular pt-1">Idag: <span id="today"></span></p>
          <p class="roboto-regular pt-2">Om 25 dagar: <span id="future-date"></span></p>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="dagar.js"></script>
</body>
</html>
